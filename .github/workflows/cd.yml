name: CD - Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REGISTRY: ${{ secrets.AWS_ECR_REGISTRY }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to AWS ECR
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        run: aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | docker login --username AWS --password-stdin ${{ secrets.AWS_ECR_REGISTRY }}

      - name: Build and Push Docker image
        run: |
          docker build \
            --tag $ECR_REGISTRY:backend-${{ github.sha }} \
            --tag $ECR_REGISTRY:backend-latest \
            -f backend/Dockerfile .
          
          docker push $ECR_REGISTRY:backend-${{ github.sha }}
          docker push $ECR_REGISTRY:backend-latest

      - name: Download frontend artifacts
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: ./frontend-dist/
        continue-on-error: true

      - name: SSH to EC2 and Deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "=== DEPLOYMENT START ==="

            # FIRST: Create .env.prod from GitHub secret
            echo "Creating .env.prod from GitHub secret..."
            printf '%s' "${{ secrets.env_prod }}" > /home/ubuntu/ecommerce/.env.prod
            echo ".env.prod created!"

            # Navigate to app directory
            cd /home/ubuntu/ecommerce
            echo "Changed to: $(pwd)"
            ls -la

            # Verify .env.prod was created
            if [ ! -f ".env.prod" ]; then
              echo "ERROR: Failed to create .env.prod"
              exit 1
            fi
            echo ".env.prod verified!"

            # Login to ECR
            aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | docker login -u AWS --password-stdin ${{ secrets.AWS_ECR_REGISTRY }}

            # Stop current containers - USE PROD FILE
            docker-compose -f docker-compose.prod.yml down || true

            # Pull latest image from ECR - USE PROD FILE
            docker-compose -f docker-compose.prod.yml pull backend

            # Deploy frontend static files
            if [ -d "frontend-dist" ]; then
              sudo rm -rf /var/www/html/*
              sudo cp -r frontend-dist/* /var/www/html/
              sudo chmod -R 755 /var/www/html/
              echo "Frontend files deployed!"
            fi

            # Start containers - USE PROD FILE
            docker-compose -f docker-compose.prod.yml up -d

            # Wait for container to start
            echo "Waiting for application to start..."
            sleep 30

            # Health check
            for i in 1 2 3 4 5; do
              if curl -f http://localhost/api/health/ 2>/dev/null; then
                echo "Health check passed!"
                break
              else
                echo "Health check attempt $i failed, retrying..."
                sleep 10
              fi
            done

            # Show running containers
            docker-compose -f docker-compose.prod.yml ps
            echo "=== DEPLOYMENT COMPLETE ==="

      - name: Verify deployment
        run: |
          echo "Checking if EC2 is reachable..."
          curl -f --connect-timeout 10 http://${{ secrets.EC2_HOST }}/api/health/ || echo "Note: Direct IP check may fail if port not open"