name: ecommerce-dev

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: runtime
    container_name: ecommerce_backend_dev
    restart: unless-stopped
    env_file:
      - .env.dev
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - static_data_dev:/app/staticfiles
      - media_data_dev:/app/media
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:18-alpine
    container_name: ecommerce_db_dev
    restart: unless-stopped
    env_file:
      - .env.dev
    ports:
      - "5433:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data_dev:
  static_data_dev:
  media_data_dev:
