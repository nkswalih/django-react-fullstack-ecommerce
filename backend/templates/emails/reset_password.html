<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Reset Password</title>
</head>
<body style="margin:0; padding:0; background:#f3f4f6; font-family:Arial, sans-serif;">

  <table width="100%" cellpadding="0" cellspacing="0" style="padding:40px 0;">
    <tr>
      <td align="center">

        <table width="500" cellpadding="0" cellspacing="0" style="background:#ffffff; border-radius:20px; overflow:hidden; box-shadow:0 10px 30px rgba(0,0,0,0.1);">

          <!-- Header (dark like your UI) -->
          <tr>
            <td style="background:#1a1a1a; padding:30px; text-align:center;">
              <h1 style="color:#ffffff; margin:0; font-size:28px;">
                EchOo
              </h1>
              <p style="color:#aaa; font-size:14px;">
                Reset your password
              </p>
            </td>
          </tr>

          <!-- Body -->
          <tr>
            <td style="padding:40px; text-align:center;">

              <h2 style="margin-bottom:20px; color:#111;">
                Reset Your Password
              </h2>

              <p style="color:#555; font-size:14px;">
                Hi {{ name }},
              </p>

              <p style="color:#555; font-size:14px;">
                Click the button below to reset your password.
              </p>

              <!-- Button -->
              <a href="{{ reset_url }}"
                 style="
                   display:inline-block;
                   margin-top:20px;
                   padding:14px 28px;
                   background:linear-gradient(#6b7280, #111827);
                   color:#ffffff;
                   text-decoration:none;
                   border-radius:999px;
                   font-weight:bold;
                 ">
                 Reset Password →
              </a>

              <p style="margin-top:30px; font-size:12px; color:#999;">
                If you didn’t request this, you can safely ignore this email.
              </p>

            </td>
          </tr>

        </table>

      </td>
    </tr>
  </table>

</body>
</html>
