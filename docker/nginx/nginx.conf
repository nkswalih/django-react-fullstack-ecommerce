upstream django_backend {
    server backend:8000;
    keepalive 32;
}

# Rate limiting — 20 requests/sec per IP
limit_req_zone $binary_remote_addr zone=api:10m rate=20r/s;

server {
    listen 80;
    server_name _;

    # Max upload size for product images
    client_max_body_size 25M;

    # Security headers
    add_header X-Frame-Options        "SAMEORIGIN"            always;
    add_header X-Content-Type-Options "nosniff"               always;
    add_header X-XSS-Protection       "1; mode=block"         always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # Static files — served by nginx directly, never hits Django
    location /static/ {
        alias /var/www/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Media files — user uploads
    location /media/ {
        alias /var/www/media/;
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }

    # API — rate limited, proxied to Django
    location /api/ {
        limit_req zone=api burst=40 nodelay;

        proxy_pass         http://django_backend;
        proxy_http_version 1.1;
        proxy_redirect     off;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";

        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }

    # Block PHP/ASP scanners — common automated attacks
    location ~* \.(php|asp|aspx|jsp|cgi)$ {
        return 444;
    }

    # Block .env, .git and other dot files
    location ~ /\. {
        deny all;
        return 404;
    }
}