name: ecommerce-prod

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: runtime
    container_name: ecommerce_backend_prod
    restart: unless-stopped
    env_file:
      - .env.prod
    expose:
      - "8000"
    volumes:
      - static_data_prod:/app/staticfiles
      - media_data_prod:/app/media
    depends_on:
      db:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    container_name: ecommerce_nginx_prod
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_data_prod:/var/www/static:ro
      - media_data_prod:/var/www/media:ro

  db:
    image: postgres:18-alpine
    container_name: ecommerce_db_prod
    restart: unless-stopped
    env_file:
      - .env.prod
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data_prod:
  static_data_prod:
  media_data_prod:
