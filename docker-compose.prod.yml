name: ecommerce-prod

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: runtime
    container_name: ecommerce_backend_prod
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      DB_SSLMODE: ""
      SECURE_SSL_REDIRECT: "0"
      DJANGO_BOOTSTRAP_DATA: "1"
      CORS_ALLOWED_ORIGINS: "http://localhost,http://localhost:5173,https://echoo-ecommerce.vercel.app"
      CSRF_TRUSTED_ORIGINS: "http://localhost,http://localhost:5173,https://echoo-ecommerce.vercel.app"
    expose:
      - "8000"
    volumes:
      - static_data_prod:/app/staticfiles
      - media_data_prod:/app/media
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; request = urllib.request.Request('http://127.0.0.1:8000/api/health/', headers={'X-Forwarded-Proto': 'https'}); urllib.request.urlopen(request, timeout=5)"
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  nginx:
    image: nginx:1.27-alpine
    container_name: ecommerce_nginx_prod
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_data_prod:/var/www/static:ro
      - media_data_prod:/var/www/media:ro
    healthcheck:
      test:
        - CMD-SHELL
        - "nginx -t && pidof nginx >/dev/null"
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  db:
    image: postgres:18-alpine
    container_name: ecommerce_db_prod
    restart: unless-stopped
    env_file:
      - .env.prod
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data_prod:
  static_data_prod:
  media_data_prod:
