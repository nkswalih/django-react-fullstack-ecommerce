name: ecommerce-prod

services:
  db:
    image: postgres:16-alpine
    container_name: ecommerce_db_prod
    restart: unless-stopped
    env_file:
      - .env.prod
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    networks:
      - app-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: runtime
    container_name: ecommerce_backend_prod
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      DB_HOST: db
      DB_SSLMODE: ""
      SECURE_SSL_REDIRECT: "0"
      SECURE_HSTS_SECONDS: "0"
      SESSION_COOKIE_SECURE: "0"
      CSRF_COOKIE_SECURE: "0"
      DJANGO_BOOTSTRAP_DATA: "1"
    expose:
      - "8000"
    volumes:
      - static_data_prod:/app/staticfiles
      - media_data_prod:/app/media
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-net
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health/', timeout=5)"
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  nginx:
    image: nginx:1.27-alpine
    container_name: ecommerce_nginx_prod
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_data_prod:/var/www/static:ro
      - media_data_prod:/var/www/media:ro
    networks:
      - app-net
    healthcheck:
      test: ["CMD-SHELL", "nginx -t && pidof nginx >/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  postgres_data_prod:
  static_data_prod:
  media_data_prod:

networks:
  app-net:
    driver: bridge